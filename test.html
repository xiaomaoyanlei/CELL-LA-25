<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>CELL LA 25 · 中文测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f7fb;
            padding: 20px;
            min-height: 100vh;
            color: #1a2a6c;
        }
        .header {
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            padding: 18px;
            border-radius: 16px;
            color: white;
            margin-bottom: 18px;
            text-align: center;
        }
        .header h1 {
            font-size: 22px;
        }
        .header .sub {
            font-size: 13px;
            opacity: 0.85;
            margin-top: 4px;
        }
        .card {
            background: white;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 14px;
            border: 1px solid #eef2f8;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
        }
        .card .title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a2a6c;
        }
        .card label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 4px;
        }
        .card input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #dde2ea;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            background: #fafbfc;
            outline: none;
            margin-bottom: 10px;
        }
        .card input:focus {
            border-color: #1a2a6c;
            background: white;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            color: white;
            touch-action: manipulation;
        }
        .btn-blue {
            background: #1a2a6c;
        }
        .btn-green {
            background: #0f7b3a;
        }
        .btn-red {
            background: #b21f1f;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-row {
            display: flex;
            gap: 10px;
        }
        .btn-row .btn {
            flex: 1;
        }
        .result-box {
            background: #f8f9fc;
            border-radius: 10px;
            padding: 14px;
            margin-top: 12px;
            font-size: 14px;
            color: #333;
            border-left: 4px solid #8892a8;
            word-break: break-all;
            max-height: 350px;
            overflow-y: auto;
            line-height: 1.6;
            white-space: pre-wrap;
            font-family: inherit;
        }
        .result-box.ok {
            border-left-color: #0f7b3a;
            background: #f0fff4;
        }
        .result-box.err {
            border-left-color: #b21f1f;
            background: #fff5f5;
        }
        .result-box.wait {
            border-left-color: #fdbb2d;
            background: #fffef5;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a2a6c;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            z-index: 999;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            max-width: 92%;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background: #0f7b3a;
        }
        .toast.error {
            background: #b21f1f;
        }
        .hint {
            font-size: 12px;
            color: #8892a8;
            margin-top: 6px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #8892a8;
            padding: 4px 0;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px;
        }
        .badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge.ok {
            background: #d4edda;
            color: #0f7b3a;
        }
        .badge.err {
            background: #f8d7da;
            color: #b21f1f;
        }
        .badge.wait {
            background: #fff3cd;
            color: #b27c1a;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📦 CELL LA 25 · 中文测试</h1>
        <div class="sub">专门测试「创建产品」和「出入库」功能</div>
    </div>

    <div class="card">
        <div class="title">📱 测试数据</div>
        <label>产品编码（扫码自动填入）</label>
        <input type="text" id="testCodigo" placeholder="输入编码，例如：TEST001" value="TEST001">
        <label>产品名称</label>
        <input type="text" id="testNombre" placeholder="输入产品名称" value="测试手机">
        <label>价格（巴波亚 B/.）</label>
        <input type="number" id="testPrecio" placeholder="0.00" value="999">
        <label>库存数量</label>
        <input type="number" id="testStock" placeholder="数量" value="10">
        <button class="btn btn-blue" id="testBtn">🚀 创建产品</button>
        <div class="hint">💡 点击按钮创建产品，结果会显示在下方</div>
    </div>

    <div class="card">
        <div class="title">📦 测试出入库</div>
        <div class="btn-row">
            <button class="btn btn-green" id="testBtnIn">📥 入库 +1</button>
            <button class="btn btn-red" id="testBtnOut">📤 出库 -1</button>
        </div>
        <div class="hint">💡 用上面的编码测试入库/出库（需要产品已存在）</div>
    </div>

    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-weight:700;font-size:15px;">📋 执行结果</span>
            <button id="clearResult" style="background:none;border:none;color:#8892a8;cursor:pointer;font-size:13px;">清空</button>
        </div>
        <div class="result-box wait" id="resultBox">⏳ 等待测试...</div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        //  Supabase 配置
        // ============================================================
        const SUPABASE_URL = 'https://hruwxcqedhogseqpbcio.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhydXd4Y3FlZGhvZ3NlcXBiY2lvIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MzUyNzExMywiZXhwIjoyMDk5MTAzMTEzfQ.VfnKr375IEpv83neEhQ9h5mLgpknIp1pyZjDaG1jCOw';

        let productos = [];

        // ============================================================
        //  提示消息
        // ============================================================
        function 提示(msg, 类型) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast show ' + (类型 || '');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => { el.className = 'toast'; }, 3000);
        }

        function 显示结果(msg, 状态) {
            const box = document.getElementById('resultBox');
            box.textContent = msg;
            box.className = 'result-box';
            if (状态) box.classList.add(状态);
        }

        // ============================================================
        //  Supabase 请求（带中文错误翻译）
        // ============================================================
        async function 请求数据库(地址, 选项 = {}) {
            const url = SUPABASE_URL + 地址;
            const 头 = {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                'Prefer': 'return=representation',
                ...选项.headers
            };
            try {
                const 回应 = await fetch(url, { ...选项, headers: 头 });
                const 内容 = await 回应.text();
                return {
                    成功: 回应.ok,
                    状态码: 回应.status,
                    数据: 内容
                };
            } catch (错误) {
                return {
                    成功: false,
                    状态码: 0,
                    数据: '网络错误: ' + 错误.message
                };
            }
        }

        // ============================================================
        //  加载产品列表
        // ============================================================
        async function 加载产品() {
            try {
                const 结果 = await 请求数据库('/rest/v1/productos?select=*');
                if (结果.成功) {
                    productos = JSON.parse(结果.数据);
                    显示结果('✅ 加载成功，共有 ' + productos.length + ' 个产品', 'ok');
                } else {
                    显示结果('❌ 加载失败\n状态码: ' + 结果.状态码 + '\n' + 翻译错误(结果.数据), 'err');
                }
            } catch (错误) {
                显示结果('❌ 加载失败: ' + 错误.message, 'err');
            }
        }

        // ============================================================
        //  翻译错误信息（把英文翻译成中文）
        // ============================================================
        function 翻译错误(英文) {
            if (!英文) return '未知错误';
            if (英文.includes('duplicate key')) return '❌ 编码已存在，请换一个编码';
            if (英文.includes('violates not-null')) return '❌ 缺少必填字段，请检查编码和名称';
            if (英文.includes('invalid input')) return '❌ 数据格式不正确，请检查编码和名称';
            if (英文.includes('permission denied')) return '❌ 没有权限，请检查 Supabase 密钥';
            if (英文.includes('timeout')) return '❌ 连接超时，请检查网络';
            if (英文.includes('not found')) return '❌ 地址不存在，请检查 Supabase 配置';
            if (英文.length > 200) return '❌ ' + 英文.substring(0, 200) + '...';
            return '❌ ' + 英文;
        }

        // ============================================================
        //  创建产品（测试专用）
        // ============================================================
        async function 创建产品() {
            const 编码 = document.getElementById('testCodigo').value.trim();
            const 名称 = document.getElementById('testNombre').value.trim();
            const 价格 = parseFloat(document.getElementById('testPrecio').value) || 0;
            const 库存 = parseInt(document.getElementById('testStock').value) || 0;

            if (!编码) {
                提示('⚠️ 请填写产品编码', 'error');
                return;
            }
            if (!名称) {
                提示('⚠️ 请填写产品名称', 'error');
                return;
            }

            // 检查是否已存在
            if (productos.some(p => p.codigo === 编码)) {
                提示('⚠️ 编码已存在: ' + 编码, 'error');
                显示结果('⚠️ 编码 "' + 编码 + '" 已经存在，请换个编码试试', 'err');
                return;
            }

            const 数据 = {
                codigo: 编码,
                nombre: 名称,
                precio: 价格,
                stock: 库存,
                minimo: 3
            };

            显示结果('⏳ 正在创建...\n发送数据: ' + JSON.stringify(数据, null, 2), 'wait');

            try {
                const 结果 = await 请求数据库('/rest/v1/productos', {
                    method: 'POST',
                    body: JSON.stringify(数据)
                });

                if (结果.成功) {
                    const 返回数据 = 结果.数据 ? JSON.parse(结果.数据) : null;
                    提示('✅ 创建成功: ' + 名称, 'success');
                    显示结果(
                        '✅ 创建成功！\n\n' +
                        '产品名称: ' + 名称 + '\n' +
                        '产品编码: ' + 编码 + '\n' +
                        '价 格: B/.' + 价格 + '\n' +
                        '库 存: ' + 库存 + ' 件\n' +
                        '状态码: HTTP ' + 结果.状态码 + '\n\n' +
                        '📌 产品已添加到数据库，可以在列表中找到。',
                        'ok'
                    );
                    await 加载产品();
                } else {
                    const 中文错误 = 翻译错误(结果.数据);
                    提示('❌ 创建失败: ' + 中文错误, 'error');
                    显示结果(
                        '❌ 创建失败\n\n' +
                        '状态码: HTTP ' + 结果.状态码 + '\n' +
                        '错误详情: ' + 中文错误 + '\n\n' +
                        '💡 可能的原因：\n' +
                        '• 编码已存在（换一个试试）\n' +
                        '• 编码或名称格式不对\n' +
                        '• 数据库连接问题',
                        'err'
                    );
                }
            } catch (错误) {
                提示('❌ 创建失败: ' + 错误.message, 'error');
                显示结果('❌ 创建失败\n' + 错误.message, 'err');
            }
        }

        // ============================================================
        //  测试入库 / 出库
        // ============================================================
        async function 测试出入库(类型) {
            const 编码 = document.getElementById('testCodigo').value.trim();
            if (!编码) {
                提示('⚠️ 请先填写产品编码', 'error');
                return;
            }

            const 产品 = productos.find(p => p.codigo === 编码);
            if (!产品) {
                提示('❌ 产品不存在: ' + 编码, 'error');
                显示结果('❌ 产品 "' + 编码 + '" 不存在，请先创建', 'err');
                return;
            }

            const 变化 = 类型 === '入库' ? 1 : -1;
            const 新库存 = Math.max(0, 产品.stock + 变化);

            if (类型 === '出库' && 产品.stock < 1) {
                提示('❌ 库存不足，当前库存: ' + 产品.stock, 'error');
                显示结果('❌ 库存不足\n当前库存: ' + 产品.stock + ' 件', 'err');
                return;
            }

            try {
                const 结果 = await 请求数据库('/rest/v1/productos?codigo=eq.' + 编码, {
                    method: 'PATCH',
                    body: JSON.stringify({ stock: 新库存 })
                });

                if (结果.成功) {
                    提示('✅ ' + 类型 + '成功: ' + 产品.nombre, 'success');
                    显示结果(
                        '✅ ' + 类型 + '成功！\n\n' +
                        '产品: ' + 产品.nombre + '\n' +
                        '编码: ' + 编码 + '\n' +
                        '变化: ' + (类型 === '入库' ? '+1' : '-1') + '\n' +
                        '库存变化: ' + 产品.stock + ' → ' + 新库存 + '\n' +
                        '状态码: HTTP ' + 结果.状态码,
                        'ok'
                    );
                    await 加载产品();
                } else {
                    提示('❌ ' + 类型 + '失败', 'error');
                    显示结果('❌ ' + 类型 + '失败\n状态码: ' + 结果.状态码 + '\n' + 翻译错误(结果.数据), 'err');
                }
            } catch (错误) {
                提示('❌ ' + 类型 + '失败: ' + 错误.message, 'error');
                显示结果('❌ ' + 类型 + '失败\n' + 错误.message, 'err');
            }
        }

        // ============================================================
        //  初始化
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            加载产品();

            document.getElementById('testBtn').addEventListener('click', 创建产品);
            document.getElementById('testBtnIn').addEventListener('click', function() { 测试出入库('入库'); });
            document.getElementById('testBtnOut').addEventListener('click', function() { 测试出入库('出库'); });

            document.getElementById('clearResult').addEventListener('click', function() {
                document.getElementById('resultBox').textContent = '⏳ 等待测试...';
                document.getElementById('resultBox').className = 'result-box wait';
            });

            // 按回车键触发创建
            document.getElementById('testNombre').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') 创建产品();
            });
            document.getElementById('testCodigo').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') 创建产品();
            });

            console.log('✅ 中文测试版已启动');
        });
    </script>
</body>
</html>
