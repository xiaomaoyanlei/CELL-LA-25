<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 CELL LA 25 · 测试</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f7fb;
        }
        .card {
            background: white;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 10px;
            border: 1px solid #e9edf4;
        }
        .card .nombre {
            font-size: 18px;
            font-weight: 700;
        }
        .card .codigo {
            font-size: 13px;
            color: #8896b0;
        }
        .card .stock {
            font-size: 16px;
            color: #0f7b3a;
            font-weight: 600;
        }
        .error {
            color: #b21f1f;
            padding: 20px;
            background: #fff0f0;
            border-radius: 10px;
        }
        .success {
            color: #0f7b3a;
            padding: 20px;
            background: #f0fff4;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>📦 CELL LA 25 · 测试版</h1>
    <div id="result">🔄 加载中...</div>

    <script>
        const SUPABASE_URL = 'https://hruwxcqedhogseqpbcio.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhydXd4Y3FlZGhvZ3NlcXBiY2lvIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MzUyNzExMywiZXhwIjoyMDk5MTAzMTEzfQ.VfnKr375IEpv83neEhQ9h5mLgpknIp1pyZjDaG1jCOw';

        async function cargar() {
            try {
                const res = await fetch(SUPABASE_URL + '/rest/v1/productos?select=*', {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY
                    }
                });
                const data = await res.json();

                if (data.length === 0) {
                    document.getElementById('result').innerHTML = '<div class="error">⚠️ 没有数据</div>';
                    return;
                }

                let html = '<div class="success">✅ 共 ' + data.length + ' 条数据</div>';
                data.forEach(p => {
                    html += `
                        <div class="card">
                            <div class="nombre">📱 ${p.nombre || '无名称'}</div>
                            <div class="codigo">编码: ${p.codigo || '无编码'}</div>
                            <div class="stock">📦 库存: ${p.stock || 0} 台</div>
                            <div style="font-size:12px;color:#8896b0;margin-top:4px;">
                                RAM: ${p.ram || '-'} | ROM: ${p.rom || '-'} | 售价: B/.${p.precio || 0}
                            </div>
                        </div>
                    `;
                });

                document.getElementById('result').innerHTML = html;
            } catch (e) {
                document.getElementById('result').innerHTML = '<div class="error">❌ 错误: ' + e.message + '</div>';
            }
        }

        cargar();
    </script>
</body>
</html>
