<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>CELL LA 25 · IMEI出入库</title>
    <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #f5f7fb;
            padding: 16px 12px 100px 12px;
            min-height: 100vh;
            color: #1a2a6c;
        }

        /* ===== 头部 ===== */
        .header {
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            padding: 16px 18px;
            border-radius: 16px;
            color: white;
            margin-bottom: 18px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 700;
        }
        .header .sync-status {
            font-size: 10px;
            background: rgba(255, 255, 255, 0.15);
            padding: 2px 8px;
            border-radius: 20px;
        }
        .header .sync-status.online {
            background: #0f7b3a;
        }
        .header .sync-status.offline {
            background: #b21f1f;
        }

        /* ===== 统计卡片 ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .stats-grid .stat-item {
            background: white;
            border-radius: 12px;
            padding: 10px 6px;
            text-align: center;
            border: 1px solid #eef2f8;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
        }
        .stats-grid .stat-item .label {
            font-size: 9px;
            color: #8892a8;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .stats-grid .stat-item .value {
            font-size: 16px;
            font-weight: 700;
            color: #1a2a6c;
            margin-top: 2px;
        }
        .stats-grid .stat-item.critico .value {
            color: #b21f1f;
        }
        .stats-grid .stat-item.total .value {
            color: #0f7b3a;
        }

        /* ===== 搜索 + 扫码按钮 ===== */
        .search-box {
            background: white;
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 14px;
            border: 1px solid #eef2f8;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            padding: 12px 14px;
            border: 1.5px solid #e2e7f0;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            background: #fafbfc;
            outline: none;
            min-width: 120px;
        }
        .search-box input:focus {
            border-color: #1a2a6c;
            box-shadow: 0 0 0 3px rgba(26, 42, 108, 0.1);
        }
        .search-box .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            touch-action: manipulation;
            flex-shrink: 0;
            color: white;
        }
        .search-box .btn.scan {
            background: #0f7b3a;
        }
        .search-box .btn.scan-imei {
            background: #b27c1a;
        }
        .search-box .btn.clear {
            background: #8892a8;
        }
        .search-box .btn:active {
            transform: scale(0.96);
        }

        /* ===== 扫码区域 ===== */
        #scanner-container {
            background: #1a1a2e;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 14px;
            display: none;
            position: relative;
            border: 2px solid #fdbb2d;
        }
        #scanner-container.active {
            display: block;
        }
        #scanner-container video {
            width: 100%;
            display: block;
        }
        #scanner-container .scan-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 40%;
            border: 3px dashed rgba(253, 187, 45, 0.7);
            border-radius: 16px;
            pointer-events: none;
        }
        .scan-close {
            position: absolute;
            top: 8px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 14px;
            cursor: pointer;
            z-index: 10;
        }

        /* ===== IMEI出入库表单 ===== */
        .form-card {
            background: white;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid #eef2f8;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
        }
        .form-card .form-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #1a2a6c;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .form-row input {
            flex: 1;
            padding: 10px 12px;
            border: 1.5px solid #e2e7f0;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Courier New', monospace;
            background: #fafbfc;
            outline: none;
            min-width: 80px;
        }
        .form-row input:focus {
            border-color: #1a2a6c;
            box-shadow: 0 0 0 3px rgba(26, 42, 108, 0.1);
        }
        .form-row select {
            padding: 10px 12px;
            border: 1.5px solid #e2e7f0;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            background: #fafbfc;
            outline: none;
            flex: 1;
            min-width: 100px;
        }
        .form-row .btn-in {
            background: #0f7b3a;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }
        .form-row .btn-out {
            background: #b21f1f;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }
        .form-row .btn-in:active,
        .form-row .btn-out:active {
            transform: scale(0.96);
        }
        .form-hint {
            font-size: 11px;
            color: #8892a8;
            margin-top: 6px;
        }
        .imei-preview {
            background: #f0f4ff;
            border-radius: 8px;
            padding: 8px 12px;
            margin-top: 8px;
            font-size: 13px;
            color: #1a2a6c;
            border-left: 3px solid #1a2a6c;
            display: none;
        }
        .imei-preview .highlight {
            font-weight: 700;
            color: #b21f1f;
        }

        /* ===== 产品列表 ===== */
        .productos-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }
        .producto-card {
            background: white;
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid #eef2f8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .producto-card .info {
            flex: 1;
        }
        .producto-card .info .nombre {
            font-size: 15px;
            font-weight: 600;
            color: #1a2a6c;
        }
        .producto-card .info .codigo {
            font-size: 12px;
            color: #8892a8;
            font-family: monospace;
        }
        .producto-card .stock-area {
            text-align: right;
            flex-shrink: 0;
            margin-left: 12px;
        }
        .producto-card .stock-area .stock {
            font-size: 18px;
            font-weight: 700;
        }
        .producto-card .stock-area .stock.alto {
            color: #0f7b3a;
        }
        .producto-card .stock-area .stock.medio {
            color: #b27c1a;
        }
        .producto-card .stock-area .stock.bajo {
            color: #b21f1f;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .producto-card .stock-area .stock-label {
            font-size: 10px;
            color: #8892a8;
            text-transform: uppercase;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        /* ===== IMEI记录列表 ===== */
        .log-card {
            background: white;
            border-radius: 14px;
            padding: 16px;
            margin-top: 6px;
            border: 1px solid #eef2f8;
        }
        .log-card .log-title {
            font-size: 13px;
            font-weight: 700;
            color: #1a2a6c;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 4px;
        }
        .log-card .log-title span {
            font-weight: 400;
            color: #8892a8;
            font-size: 11px;
        }
        .log-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 12px;
            border-bottom: 1px solid #f0f2f5;
            color: #333;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }
        .log-item .log-status {
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 10px;
        }
        .log-item .log-status.IN {
            background: #d4edda;
            color: #0f7b3a;
        }
        .log-item .log-status.OUT {
            background: #f8d7da;
            color: #b21f1f;
        }
        .log-item .log-imei {
            font-family: monospace;
            font-weight: 600;
            color: #1a2a6c;
        }
        .log-item .log-time {
            color: #8892a8;
            font-size: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px 0;
            color: #8892a8;
        }
        .empty {
            text-align: center;
            padding: 40px 0;
            color: #8892a8;
        }
        .empty span {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a2a6c;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            z-index: 999;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background: #0f7b3a;
        }
        .toast.error {
            background: #b21f1f;
        }
        .footer {
            text-align: center;
            padding: 16px 0 4px 0;
            font-size: 11px;
            color: #8892a8;
        }

        /* ===== Tabs切换 ===== */
        .tab-bar {
            display: flex;
            gap: 4px;
            margin-bottom: 14px;
            background: white;
            border-radius: 14px;
            padding: 4px;
            border: 1px solid #eef2f8;
        }
        .tab-bar .tab {
            flex: 1;
            padding: 10px 8px;
            text-align: center;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            color: #8892a8;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            background: transparent;
            touch-action: manipulation;
        }
        .tab-bar .tab.active {
            background: #1a2a6c;
            color: white;
        }
        .tab-bar .tab:active {
            transform: scale(0.96);
        }

        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .form-row input {
                font-size: 14px;
                padding: 8px 10px;
            }
            .form-row select {
                font-size: 13px;
                padding: 8px 10px;
            }
            .producto-card {
                padding: 10px 12px;
            }
            .search-box input {
                font-size: 15px;
                padding: 10px 12px;
            }
            .tab-bar .tab {
                font-size: 11px;
                padding: 8px 4px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 头部 ===== -->
    <div class="header">
        <h1>📦 CELL LA 25</h1>
        <div style="display:flex;align-items:center;gap:6px;">
            <span class="sync-status" id="syncStatus">🔄</span>
            <span style="font-size:10px;background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:20px;">IMEI</span>
        </div>
    </div>

    <!-- ===== 统计 ===== -->
    <div class="stats-grid">
        <div class="stat-item total">
            <div class="label">产品数</div>
            <div class="value" id="totalProductos">0</div>
        </div>
        <div class="stat-item">
            <div class="label">总库存</div>
            <div class="value" id="totalUnidades">0</div>
        </div>
        <div class="stat-item">
            <div class="label">📱 IMEI总数</div>
            <div class="value" id="totalImei">0</div>
        </div>
        <div class="stat-item critico">
            <div class="label">⚠️ 临界</div>
            <div class="value" id="totalCriticos">0</div>
        </div>
    </div>

    <!-- ===== 搜索 ===== -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 搜索产品 / IMEI" autofocus>
        <button class="btn scan" id="scanBtn">📷 扫产品</button>
        <button class="btn scan-imei" id="scanImeiBtn">📱 扫IMEI</button>
        <button class="btn clear" id="clearBtn">✕</button>
    </div>

    <!-- ===== 扫码区域 ===== -->
    <div id="scanner-container">
        <button class="scan-close" id="closeScanner">✕ 关闭</button>
        <div id="scanner-view"></div>
        <div class="scan-overlay"></div>
        <div style="position:absolute;bottom:12px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.6);font-size:11px;z-index:5;">
            ｜ 扫码模式：<span id="scanModeLabel">产品编码</span> ｜
        </div>
    </div>

    <!-- ===== Tab切换 ===== -->
    <div class="tab-bar">
        <button class="tab active" data-tab="tabStock">📦 库存</button>
        <button class="tab" data-tab="tabImei">📱 IMEI出入库</button>
    </div>

    <!-- ===== Tab1: 库存 ===== -->
    <div class="tab-content active" id="tabStock">
        <div id="loading" class="loading">🔄 加载产品...</div>
        <div id="productosContainer" class="productos-list" style="display:none;"></div>
    </div>

    <!-- ===== Tab2: IMEI出入库 ===== -->
    <div class="tab-content" id="tabImei">
        <!-- IMEI操作表单 -->
        <div class="form-card">
            <div class="form-title">📱 IMEI出入库操作</div>
            <div class="form-row">
                <input type="text" id="formImei" placeholder="扫描或输入IMEI号" style="flex:2;">
                <select id="formProductoSelect">
                    <option value="">选择产品型号</option>
                </select>
                <button class="btn-in" id="btnImeiIn">📥 入库</button>
                <button class="btn-out" id="btnImeiOut">📤 出库</button>
            </div>
            <div class="imei-preview" id="imeiPreview">
                📱 IMEI: <span id="previewImei"></span>
                <br>📦 产品: <span id="previewProducto">—</span>
                <br>📌 状态: <span id="previewStatus" class="highlight">—</span>
            </div>
            <div class="form-hint">💡 扫IMEI码自动填入，选择对应产品型号后操作</div>
        </div>

        <!-- IMEI记录列表 -->
        <div class="log-card">
            <div class="log-title">
                📜 IMEI记录
                <span id="imeiLogCount">共 0 条</span>
            </div>
            <div id="imeiLogList">
                <div style="color:#8892a8;font-size:12px;text-align:center;padding:8px 0;">暂无IMEI记录</div>
            </div>
        </div>
    </div>

    <div class="footer">实时数据 · CELL LA 25 · IMEI追踪</div>
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        //  配置
        // ============================================================
        const SUPABASE_URL = 'https://hruwxcqedhogseqpbcio.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhydXd4Y3FlZGhvZ3NlcXBiY2lvIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MzUyNzExMywiZXhwIjoyMDk5MTAzMTEzfQ.VfnKr375IEpv83neEhQ9h5mLgpknIp1pyZjDaG1jCOw';

        let productos = [];
        let filteredProductos = [];
        let imeiRecords = [];
        let scanMode = 'producto'; // 'producto' 或 'imei'

        // ============================================================
        //  Supabase 请求
        // ============================================================
        async function supabaseFetch(endpoint, options = {}) {
            const url = SUPABASE_URL + endpoint;
            const headers = {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                ...options.headers
            };
            const response = await fetch(url, { ...options, headers });
            if (!response.ok) {
                const text = await response.text();
                throw new Error(`HTTP ${response.status}`);
            }
            return response.json();
        }

        // ============================================================
        //  加载数据
        // ============================================================
        async function cargarProductos() {
            try {
                const data = await supabaseFetch('/rest/v1/productos?select=*');
                productos = data;
                aplicarFiltro();
                // 更新产品下拉框
                actualizarSelectProductos();
                document.getElementById('syncStatus').textContent = '✅ 在线';
                document.getElementById('syncStatus').className = 'sync-status online';
                renderAll();
                return true;
            } catch (e) {
                console.error(e);
                document.getElementById('syncStatus').textContent = '⚠️ 离线';
                document.getElementById('syncStatus').className = 'sync-status offline';
                toast('⚠️ 加载失败', 'error');
                return false;
            }
        }

        async function cargarImeiRecords() {
            try {
                const data = await supabaseFetch('/rest/v1/imei_records?select=*&order=created_at.desc&limit=100');
                imeiRecords = data || [];
                renderImeiLog();
                document.getElementById('totalImei').textContent = imeiRecords.length;
                return true;
            } catch (e) {
                console.error('IMEI加载失败:', e);
                imeiRecords = [];
                renderImeiLog();
                return false;
            }
        }

        function actualizarSelectProductos() {
            const select = document.getElementById('formProductoSelect');
            select.innerHTML = '<option value="">选择产品型号</option>';
            productos.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.codigo;
                opt.textContent = p.nombre + ' (' + p.codigo + ')';
                select.appendChild(opt);
            });
        }

        function aplicarFiltro() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!q) {
                filteredProductos = [...productos];
            } else {
                // 同时支持按IMEI搜索
                const matchedImei = imeiRecords.filter(r => r.imei.includes(q)).map(r => r.producto_codigo);
                filteredProductos = productos.filter(p =>
                    p.nombre.toLowerCase().includes(q) ||
                    p.codigo.toLowerCase().includes(q) ||
                    matchedImei.includes(p.codigo)
                );
            }
        }

        // ============================================================
        //  IMEI 核心操作
        // ============================================================
        async function ejecutarImeiOperacion(imei, productoCodigo, tipo) {
            if (!imei || imei.length < 8) {
                toast('⚠️ 请输入有效的IMEI号（至少8位）', 'error');
                return false;
            }
            if (!productoCodigo) {
                toast('⚠️ 请选择产品型号', 'error');
                return false;
            }

            // 查找产品
            const producto = productos.find(p => p.codigo === productoCodigo);
            if (!producto) {
                toast('❌ 未找到产品: ' + productoCodigo, 'error');
                return false;
            }

            // 检查IMEI是否已存在
            const existente = imeiRecords.find(r => r.imei === imei);

            if (tipo === 'IN') {
                // 入库：如果已存在且状态为OUT，更新为IN；如果不存在则新建
                if (existente && existente.status === 'IN') {
                    toast('⚠️ IMEI ' + imei + ' 已入库', 'error');
                    return false;
                }
                try {
                    if (existente) {
                        // 更新状态为IN
                        await supabaseFetch('/rest/v1/imei_records?imei=eq.' + imei, {
                            method: 'PATCH',
                            body: JSON.stringify({
                                status: 'IN',
                                producto_codigo: productoCodigo,
                                producto_nombre: producto.nombre,
                                updated_at: new Date().toISOString()
                            })
                        });
                    } else {
                        // 新建记录
                        await supabaseFetch('/rest/v1/imei_records', {
                            method: 'POST',
                            body: JSON.stringify({
                                imei: imei,
                                producto_codigo: productoCodigo,
                                producto_nombre: producto.nombre,
                                status: 'IN'
                            })
                        });
                    }
                    // 增加产品库存
                    await supabaseFetch('/rest/v1/productos?codigo=eq.' + productoCodigo, {
                        method: 'PATCH',
                        body: JSON.stringify({ stock: producto.stock + 1 })
                    });
                    // 更新本地
                    producto.stock += 1;
                    toast('✅ IMEI ' + imei + ' 入库成功 → ' + producto.nombre, 'success');
                    await recargarTodo();
                    return true;
                } catch (e) {
                    console.error(e);
                    toast('❌ 入库失败: ' + e.message, 'error');
                    return false;
                }
            } else if (tipo === 'OUT') {
                // 出库：必须存在且状态为IN
                if (!existente) {
                    toast('❌ IMEI ' + imei + ' 未入库，无法出库', 'error');
                    return false;
                }
                if (existente.status === 'OUT') {
                    toast('⚠️ IMEI ' + imei + ' 已出库', 'error');
                    return false;
                }
                if (producto.stock <= 0) {
                    toast('❌ 产品库存不足', 'error');
                    return false;
                }
                try {
                    await supabaseFetch('/rest/v1/imei_records?imei=eq.' + imei, {
                        method: 'PATCH',
                        body: JSON.stringify({
                            status: 'OUT',
                            updated_at: new Date().toISOString()
                        })
                    });
                    // 减少产品库存
                    await supabaseFetch('/rest/v1/productos?codigo=eq.' + productoCodigo, {
                        method: 'PATCH',
                        body: JSON.stringify({ stock: producto.stock - 1 })
                    });
                    producto.stock -= 1;
                    toast('✅ IMEI ' + imei + ' 出库成功 → ' + producto.nombre, 'success');
                    await recargarTodo();
                    return true;
                } catch (e) {
                    console.error(e);
                    toast('❌ 出库失败: ' + e.message, 'error');
                    return false;
                }
            }
        }

        async function recargarTodo() {
            await cargarProductos();
            await cargarImeiRecords();
            renderAll();
        }

        // ============================================================
        //  渲染
        // ============================================================
        function renderStats() {
            const total = productos.length;
            const totalUds = productos.reduce((s, p) => s + p.stock, 0);
            const criticos = productos.filter(p => p.stock <= (p.minimo || 3)).length;
            document.getElementById('totalProductos').textContent = total;
            document.getElementById('totalUnidades').textContent = totalUds;
            document.getElementById('totalCriticos').textContent = criticos;
            document.getElementById('totalImei').textContent = imeiRecords.length;
        }

        function renderProductos() {
            const container = document.getElementById('productosContainer');
            const loading = document.getElementById('loading');
            if (filteredProductos.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        <span>📭</span>
                        ${productos.length === 0 ? '暂无产品' : '未找到匹配结果'}
                    </div>
                `;
                container.style.display = 'block';
                loading.style.display = 'none';
                return;
            }
            let html = '';
            filteredProductos.forEach(p => {
                const status = getStockStatus(p.stock, p.minimo);
                // 查询该产品的IMEI数量
                const imeiCount = imeiRecords.filter(r => r.producto_codigo === p.codigo && r.status === 'IN').length;
                html += `
                    <div class="producto-card">
                        <div class="info">
                            <div class="nombre">${p.nombre}</div>
                            <div class="codigo">${p.codigo}  📱IMEI: ${imeiCount}</div>
                        </div>
                        <div class="stock-area">
                            <div class="stock ${status.class}">${p.stock}</div>
                            <div class="stock-label">${status.label}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            container.style.display = 'flex';
            loading.style.display = 'none';
        }

        function renderImeiLog() {
            const list = document.getElementById('imeiLogList');
            const count = document.getElementById('imeiLogCount');
            count.textContent = '共 ' + imeiRecords.length + ' 条';
            if (imeiRecords.length === 0) {
                list.innerHTML = '<div style="color:#8892a8;font-size:12px;text-align:center;padding:8px 0;">暂无IMEI记录</div>';
                return;
            }
            let html = '';
            imeiRecords.slice(0, 30).forEach(r => {
                const statusLabel = r.status === 'IN' ? '已入库' : '已出库';
                const cls = r.status === 'IN' ? 'IN' : 'OUT';
                const time = r.created_at ? new Date(r.created_at).toLocaleString('zh-CN', { hour12: false }) : '';
                html += `
                    <div class="log-item">
                        <span>
                            <span class="log-status ${cls}">${statusLabel}</span>
                            <span class="log-imei">${r.imei}</span>
                            <span style="color:#666;">${r.producto_nombre || r.producto_codigo}</span>
                        </span>
                        <span class="log-time">${time}</span>
                    </div>
                `;
            });
            list.innerHTML = html;
        }

        function renderAll() {
            renderStats();
            renderProductos();
            renderImeiLog();
        }

        function getStockStatus(stock, minimo) {
            if (stock <= 0) return { label: '无库存', class: 'bajo' };
            if (stock <= (minimo || 3)) return { label: '临界', class: 'bajo' };
            if (stock >= 10) return { label: '充足', class: 'alto' };
            return { label: '中等', class: 'medio' };
        }

        // ============================================================
        //  Toast
        // ============================================================
        function toast(msg, tipo) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast show ' + (tipo || '');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => { el.className = 'toast'; }, 3000);
        }

        // ============================================================
        //  扫码 (QuaggaJS)
        // ============================================================
        let quaggaInit = false;
        let currentScanMode = 'producto';

        function startScanner(mode) {
            currentScanMode = mode || 'producto';
            document.getElementById('scanModeLabel').textContent = mode === 'imei' ? 'IMEI码' : '产品编码';

            const container = document.getElementById('scanner-container');
            const view = document.getElementById('scanner-view');
            container.classList.add('active');

            if (quaggaInit) { Quagga.start(); return; }

            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: view,
                    constraints: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } }
                },
                decoder: {
                    readers: ["ean_reader", "ean_8_reader", "code_128_reader", "code_39_reader", "upc_reader",
                        "upc_e_reader", "code_93_reader"
                    ]
                }
            }, function(err) {
                if (err) {
                    toast('❌ 摄像头启动失败', 'error');
                    container.classList.remove('active');
                    return;
                }
                quaggaInit = true;
                Quagga.start();
            });

            Quagga.onDetected(function(data) {
                const code = data.codeResult.code;
                if (code) {
                    if (currentScanMode === 'imei') {
                        // IMEI模式：填入IMEI输入框
                        document.getElementById('formImei').value = code;
                        // 自动查询IMEI状态
                        consultarImei(code);
                        toast('📱 扫描到IMEI: ' + code, 'success');
                    } else {
                        // 产品模式：填入搜索框
                        document.getElementById('searchInput').value = code;
                        document.getElementById('searchInput').dispatchEvent(new Event('input'));
                        toast('📷 扫描到编码: ' + code, 'success');
                    }
                    stopScanner();
                }
            });
        }

        function stopScanner() {
            if (quaggaInit) Quagga.stop();
            document.getElementById('scanner-container').classList.remove('active');
        }

        // ============================================================
        //  IMEI查询
        // ============================================================
        function consultarImei(imei) {
            const record = imeiRecords.find(r => r.imei === imei);
            const preview = document.getElementById('imeiPreview');
            document.getElementById('previewImei').textContent = imei;

            if (record) {
                document.getElementById('previewProducto').textContent = record.producto_nombre || record.producto_codigo;
                document.getElementById('previewStatus').textContent = record.status === 'IN' ? '✅ 已入库' : '📤 已出库';
                document.getElementById('previewStatus').style.color = record.status === 'IN' ? '#0f7b3a' : '#b21f1f';
                // 自动选中产品
                document.getElementById('formProductoSelect').value = record.producto_codigo || '';
            } else {
                document.getElementById('previewProducto').textContent = '❌ 未找到记录';
                document.getElementById('previewStatus').textContent = '🆕 新设备，可入库';
                document.getElementById('previewStatus').style.color = '#b27c1a';
            }
            preview.style.display = 'block';
        }

        // ============================================================
        //  Tab切换
        // ============================================================
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(this.dataset.tab).classList.add('active');
            });
        });

        // ============================================================
        //  初始化
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            cargarProductos();
            cargarImeiRecords();

            // 搜索
            document.getElementById('searchInput').addEventListener('input', function() {
                aplicarFiltro();
                renderProductos();
            });

            // 清空
            document.getElementById('clearBtn').addEventListener('click', function() {
                document.getElementById('searchInput').value = '';
                document.getElementById('searchInput').focus();
                aplicarFiltro();
                renderProductos();
            });

            // 扫产品按钮
            document.getElementById('scanBtn').addEventListener('click', function() {
                if (document.getElementById('scanner-container').classList.contains('active')) {
                    stopScanner();
                } else {
                    startScanner('producto');
                }
            });

            // 扫IMEI按钮
            document.getElementById('scanImeiBtn').addEventListener('click', function() {
                if (document.getElementById('scanner-container').classList.contains('active')) {
                    stopScanner();
                } else {
                    startScanner('imei');
                }
            });

            document.getElementById('closeScanner').addEventListener('click', stopScanner);

            // IMEI输入实时查询
            document.getElementById('formImei').addEventListener('input', function() {
                const val = this.value.trim();
                if (val.length >= 8) {
                    consultarImei(val);
                } else {
                    document.getElementById('imeiPreview').style.display = 'none';
                }
            });

            // IMEI入库
            document.getElementById('btnImeiIn').addEventListener('click', function() {
                const imei = document.getElementById('formImei').value.trim();
                const codigo = document.getElementById('formProductoSelect').value;
                ejecutarImeiOperacion(imei, codigo, 'IN');
            });

            // IMEI出库
            document.getElementById('btnImeiOut').addEventListener('click', function() {
                const imei = document.getElementById('formImei').value.trim();
                const codigo = document.getElementById('formProductoSelect').value;
                ejecutarImeiOperacion(imei, codigo, 'OUT');
            });

            // 自动刷新
            setInterval(() => {
                cargarProductos();
                cargarImeiRecords();
            }, 30000);

            setTimeout(() => { document.getElementById('searchInput').focus(); }, 500);
        });
    </script>
</body>
</html>
