<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CELL LA 25 · 测试</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f7fb; }
        .card { background: white; border-radius: 14px; padding: 20px; margin-bottom: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1.5px solid #e2e7f0; border-radius: 10px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #1a2a6c; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
        .result { background: #f0f4ff; border-radius: 10px; padding: 12px; margin-top: 12px; white-space: pre-wrap; font-size: 14px; }
        .error { background: #fff0f0; border-left: 3px solid red; }
        .success { background: #f0fff4; border-left: 3px solid green; }
    </style>
</head>
<body>
    <h1>📦 CELL LA 25 · 创建测试</h1>
    <div class="card">
        <label>产品编码</label>
        <input type="text" id="codigo" value="999999999">
        <label>产品名称</label>
        <input type="text" id="nombre" value="荣耀X5">
        <label>价格</label>
        <input type="number" id="precio" value="999">
        <label>库存</label>
        <input type="number" id="stock" value="1">
        <button onclick="crear()">🚀 创建产品</button>
    </div>
    <div class="card">
        <div id="resultado" class="result">等待操作...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hruwxcqedhogseqpbcio.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhydXd4Y3FlZGhvZ3NlcXBiY2lvIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MzUyNzExMywiZXhwIjoyMDk5MTAzMTEzfQ.VfnKr375IEpv83neEhQ9h5mLgpknIp1pyZjDaG1jCOw';

        async function crear() {
            const codigo = document.getElementById('codigo').value.trim();
            const nombre = document.getElementById('nombre').value.trim();
            const precio = parseFloat(document.getElementById('precio').value) || 0;
            const stock = parseInt(document.getElementById('stock').value) || 0;

            const data = { codigo, nombre, precio, stock, minimo: 3 };
            document.getElementById('resultado').textContent = '⏳ 发送中...\n' + JSON.stringify(data, null, 2);
            document.getElementById('resultado').className = 'result';

            try {
                const res = await fetch(SUPABASE_URL + '/rest/v1/productos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_KEY,
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(data)
                });
                const text = await res.text();
                if (res.ok) {
                    document.getElementById('resultado').textContent = '✅ 创建成功！\n' + text;
                    document.getElementById('resultado').className = 'result success';
                } else {
                    document.getElementById('resultado').textContent = '❌ 创建失败\n状态码: ' + res.status + '\n' + text;
                    document.getElementById('resultado').className = 'result error';
                }
            } catch (e) {
                document.getElementById('resultado').textContent = '❌ 网络错误: ' + e.message;
                document.getElementById('resultado').className = 'result error';
            }
        }
    </script>
</body>
</html>
