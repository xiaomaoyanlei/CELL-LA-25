<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>CELL LA 25 · 扫码库存</title>
    <!-- 引入 QuaggaJS 用于扫码 -->
    <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #f5f7fb;
            padding: 16px 12px 40px 12px;
            min-height: 100vh;
            color: #1a2a6c;
        }
        .header {
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            padding: 16px 18px;
            border-radius: 16px;
            color: white;
            margin-bottom: 18px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .header .badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 10px;
        }
        .header .sync-status {
            font-size: 10px;
            background: rgba(255, 255, 255, 0.15);
            padding: 2px 8px;
            border-radius: 20px;
        }
        .header .sync-status.online {
            background: #0f7b3a;
        }
        .header .sync-status.offline {
            background: #b21f1f;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .stats-grid .stat-item {
            background: white;
            border-radius: 12px;
            padding: 12px 10px;
            text-align: center;
            border: 1px solid #eef2f8;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
        }
        .stats-grid .stat-item .label {
            font-size: 10px;
            color: #8892a8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stats-grid .stat-item .value {
            font-size: 20px;
            font-weight: 700;
            color: #1a2a6c;
            margin-top: 2px;
        }
        .stats-grid .stat-item.critico .value {
            color: #b21f1f;
        }
        .stats-grid .stat-item.total .value {
            color: #0f7b3a;
        }

        .search-box {
            background: white;
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 14px;
            border: 1px solid #eef2f8;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            padding: 12px 14px;
            border: 1.5px solid #e2e7f0;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            background: #fafbfc;
            outline: none;
            transition: 0.2s;
            min-width: 150px;
        }
        .search-box input:focus {
            border-color: #1a2a6c;
            background: white;
            box-shadow: 0 0 0 3px rgba(26, 42, 108, 0.1);
        }
        .search-box .btn {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            background: #1a2a6c;
            color: white;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        .search-box .btn:active {
            transform: scale(0.96);
        }
        .search-box .btn.scan {
            background: #0f7b3a;
        }
        .search-box .btn.scan:active {
            background: #0a5f2b;
        }
        .search-box .btn.income {
            background: #b27c1a;
        }
        .search-box .btn.outcome {
            background: #b21f1f;
        }
        .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        /* 扫码区域 */
        #scanner-container {
            background: #1a1a2e;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 14px;
            display: none;
            position: relative;
            border: 2px solid #fdbb2d;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        #scanner-container.active {
            display: block;
        }
        #scanner-container video {
            width: 100%;
            display: block;
        }
        #scanner-container .scan-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 40%;
            border: 3px dashed rgba(253, 187, 45, 0.7);
            border-radius: 16px;
            pointer-events: none;
        }
        .scan-close {
            position: absolute;
            top: 8px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 14px;
            cursor: pointer;
            z-index: 10;
        }

        .productos-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 80px;
        }

        .producto-card {
            background: white;
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid #eef2f8;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.15s;
        }
        .producto-card:active {
            transform: scale(0.98);
        }
        .producto-card .info {
            flex: 1;
        }
        .producto-card .info .nombre {
            font-size: 15px;
            font-weight: 600;
            color: #1a2a6c;
        }
        .producto-card .info .codigo {
            font-size: 12px;
            color: #8892a8;
            font-family: monospace;
            margin-top: 2px;
        }
        .producto-card .stock-area {
            text-align: right;
            flex-shrink: 0;
            margin-left: 12px;
        }
        .producto-card .stock-area .stock {
            font-size: 18px;
            font-weight: 700;
        }
        .producto-card .stock-area .stock.alto {
            color: #0f7b3a;
        }
        .producto-card .stock-area .stock.medio {
            color: #b27c1a;
        }
        .producto-card .stock-area .stock.bajo {
            color: #b21f1f;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .producto-card .stock-area .stock-label {
            font-size: 10px;
            color: #8892a8;
            text-transform: uppercase;
        }
        .producto-card .stock-area .precio {
            font-size: 13px;
            color: #8892a8;
            margin-top: 2px;
        }
        .producto-card .acciones {
            display: flex;
            gap: 6px;
            margin-left: 10px;
        }
        .producto-card .acciones button {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            touch-action: manipulation;
            color: white;
        }
        .producto-card .acciones .btn-in {
            background: #0f7b3a;
        }
        .producto-card .acciones .btn-out {
            background: #b21f1f;
        }
        .producto-card .acciones button:active {
            transform: scale(0.94);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .loading {
            text-align: center;
            padding: 40px 0;
            color: #8892a8;
            font-size: 15px;
        }
        .empty {
            text-align: center;
            padding: 40px 0;
            color: #8892a8;
            font-size: 15px;
        }
        .empty span {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a2a6c;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            z-index: 999;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background: #0f7b3a;
        }
        .toast.error {
            background: #b21f1f;
        }

        .footer {
            text-align: center;
            padding: 20px 0 10px 0;
            font-size: 11px;
            color: #8892a8;
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 6px;
            }
            .stats-grid .stat-item .value {
                font-size: 17px;
            }
            .producto-card {
                padding: 12px 14px;
                flex-wrap: wrap;
            }
            .producto-card .info .nombre {
                font-size: 14px;
            }
            .producto-card .stock-area .stock {
                font-size: 16px;
            }
            .search-box input {
                font-size: 15px;
                padding: 10px 12px;
            }
            .producto-card .acciones {
                margin-left: 0;
                width: 100%;
                justify-content: flex-end;
                margin-top: 6px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📦 CELL LA 25</h1>
        <div style="display:flex;align-items:center;gap:6px;">
            <span class="sync-status" id="syncStatus">🔄</span>
            <span class="badge">扫码·库存</span>
        </div>
    </div>

    <div class="stats-grid" id="statsGrid">
        <div class="stat-item total">
            <div class="label">产品数</div>
            <div class="value" id="totalProductos">0</div>
        </div>
        <div class="stat-item">
            <div class="label">总库存</div>
            <div class="value" id="totalUnidades">0</div>
        </div>
        <div class="stat-item critico">
            <div class="label">⚠️ 临界</div>
            <div class="value" id="totalCriticos">0</div>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 搜索产品 / 扫码结果..." autofocus>
        <div class="btn-group">
            <button class="btn scan" id="scanBtn">📷 扫码</button>
            <button class="btn" id="clearBtn">✕</button>
        </div>
    </div>

    <!-- 扫码区域 -->
    <div id="scanner-container">
        <button class="scan-close" id="closeScanner">✕ 关闭</button>
        <div id="scanner-view"></div>
        <div class="scan-overlay"></div>
    </div>

    <div id="loading" class="loading">🔄 加载产品...</div>
    <div id="productosContainer" class="productos-list" style="display:none;"></div>

    <div class="toast" id="toast"></div>
    <div class="footer">实时数据 · CELL LA 25 · 扫码入库/出库</div>

    <script>
        // ============================================
        //  CONFIG SUPABASE
        // ============================================
        const SUPABASE_URL = 'https://hruwxcqedhogseqpbcio.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhydXd4Y3FlZGhvZ3NlcXBiY2lvIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MzUyNzExMywiZXhwIjoyMDk5MTAzMTEzfQ.VfnKr375IEpv83neEhQ9h5mLgpknIp1pyZjDaG1jCOw';

        let productos = [];
        let filteredProductos = [];
        let scannerActive = false;

        // ============================================
        //  SUPABASE FETCH
        // ============================================
        async function supabaseFetch(endpoint, options = {}) {
            const url = SUPABASE_URL + endpoint;
            const headers = {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                ...options.headers
            };
            const response = await fetch(url, { ...options, headers });
            if (!response.ok) {
                const text = await response.text();
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        }

        // ============================================
        //  CRUD 库存操作 (直接更新到Supabase)
        // ============================================
        async function actualizarStock(codigo, delta) {
            // 找到本地产品
            const idx = productos.findIndex(p => p.codigo === codigo);
            if (idx === -1) {
                toast('❌ 未找到产品: ' + codigo, 'error');
                return false;
            }
            const producto = productos[idx];
            const nuevoStock = Math.max(0, producto.stock + delta);
            if (nuevoStock === producto.stock) {
                toast('⚠️ 库存无变化', 'error');
                return false;
            }

            try {
                // 更新 Supabase
                const endpoint = `/rest/v1/productos?codigo=eq.${codigo}`;
                await supabaseFetch(endpoint, {
                    method: 'PATCH',
                    body: JSON.stringify({ stock: nuevoStock })
                });
                // 更新本地
                producto.stock = nuevoStock;
                productos[idx] = producto;
                // 重新过滤 & 渲染
                aplicarFiltro();
                renderAll();
                toast(`✅ ${producto.nombre} · 库存 ${delta > 0 ? '+' : ''}${delta} → ${nuevoStock}`, 'success');
                return true;
            } catch (e) {
                console.error(e);
                toast('❌ 更新失败: ' + e.message, 'error');
                return false;
            }
        }

        // ============================================
        //  加载产品
        // ============================================
        async function cargarProductos() {
            try {
                const data = await supabaseFetch('/rest/v1/productos?select=*');
                productos = data;
                aplicarFiltro();
                document.getElementById('syncStatus').textContent = '✅ 在线';
                document.getElementById('syncStatus').className = 'sync-status online';
                renderAll();
                return true;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('syncStatus').textContent = '⚠️ 离线';
                document.getElementById('syncStatus').className = 'sync-status offline';
                toast('⚠️ 加载数据失败', 'error');
                return false;
            }
        }

        function aplicarFiltro() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!q) {
                filteredProductos = [...productos];
            } else {
                filteredProductos = productos.filter(p =>
                    p.nombre.toLowerCase().includes(q) ||
                    p.codigo.toLowerCase().includes(q)
                );
            }
        }

        // ============================================
        //  HELPERS
        // ============================================
        function formatMoneda(val) {
            return 'B/.' + val.toFixed(2);
        }

        function toast(msg, tipo) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast show ' + (tipo || '');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => { el.className = 'toast'; }, 2500);
        }

        function getStockStatus(stock, minimo) {
            if (stock <= 0) return { label: '无库存', class: 'bajo' };
            if (stock <= (minimo || 3)) return { label: '临界', class: 'bajo' };
            if (stock >= 10) return { label: '充足', class: 'alto' };
            return { label: '中等', class: 'medio' };
        }

        // ============================================
        //  RENDER
        // ============================================
        function renderStats() {
            const total = productos.length;
            const totalUds = productos.reduce((sum, p) => sum + p.stock, 0);
            const criticos = productos.filter(p => p.stock <= (p.minimo || 3)).length;
            document.getElementById('totalProductos').textContent = total;
            document.getElementById('totalUnidades').textContent = totalUds;
            document.getElementById('totalCriticos').textContent = criticos;
        }

        function renderProductos() {
            const container = document.getElementById('productosContainer');
            const loading = document.getElementById('loading');
            if (filteredProductos.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        <span>📭</span>
                        ${productos.length === 0 ? '暂无产品' : '未找到匹配结果'}
                    </div>
                `;
                container.style.display = 'block';
                loading.style.display = 'none';
                return;
            }
            let html = '';
            filteredProductos.forEach(p => {
                const status = getStockStatus(p.stock, p.minimo);
                html += `
                    <div class="producto-card" data-codigo="${p.codigo}">
                        <div class="info">
                            <div class="nombre">${p.nombre}</div>
                            <div class="codigo">${p.codigo}</div>
                        </div>
                        <div class="stock-area">
                            <div class="stock ${status.class}">${p.stock}</div>
                            <div class="stock-label">${status.label}</div>
                            <div class="precio">${formatMoneda(p.precio)}</div>
                        </div>
                        <div class="acciones">
                            <button class="btn-in" data-codigo="${p.codigo}" data-delta="1">+1 入库</button>
                            <button class="btn-out" data-codigo="${p.codigo}" data-delta="-1">-1 出库</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            container.style.display = 'flex';
            loading.style.display = 'none';

            // 绑定库存按钮事件
            container.querySelectorAll('.btn-in, .btn-out').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const codigo = this.dataset.codigo;
                    const delta = parseInt(this.dataset.delta);
                    actualizarStock(codigo, delta);
                });
            });
        }

        function renderAll() {
            renderStats();
            renderProductos();
        }

        // ============================================
        //  扫码功能 (QuaggaJS)
        // ============================================
        let quaggaInitialized = false;

        function startScanner() {
            const container = document.getElementById('scanner-container');
            const view = document.getElementById('scanner-view');
            container.classList.add('active');

            if (quaggaInitialized) {
                Quagga.start();
                return;
            }

            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: view,
                    constraints: {
                        facingMode: "environment",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                },
                decoder: {
                    readers: ["ean_reader", "ean_8_reader", "code_128_reader", "code_39_reader", "upc_reader", "upc_e_reader"]
                }
            }, function(err) {
                if (err) {
                    console.error(err);
                    toast('❌ 无法启动摄像头: ' + err, 'error');
                    container.classList.remove('active');
                    return;
                }
                quaggaInitialized = true;
                Quagga.start();
            });

            Quagga.onDetected(function(data) {
                const code = data.codeResult.code;
                if (code) {
                    toast('📷 扫码结果: ' + code, 'success');
                    document.getElementById('searchInput').value = code;
                    document.getElementById('searchInput').dispatchEvent(new Event('input'));
                    // 自动停止扫码
                    stopScanner();
                }
            });
        }

        function stopScanner() {
            if (quaggaInitialized) {
                Quagga.stop();
            }
            document.getElementById('scanner-container').classList.remove('active');
            scannerActive = false;
        }

        // ============================================
        //  INICIALIZACIÓN
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            cargarProductos();

            // 搜索输入
            document.getElementById('searchInput').addEventListener('input', function() {
                aplicarFiltro();
                renderProductos();
            });

            // 清空搜索
            document.getElementById('clearBtn').addEventListener('click', function() {
                document.getElementById('searchInput').value = '';
                document.getElementById('searchInput').focus();
                aplicarFiltro();
                renderProductos();
            });

            // 扫码按钮
            document.getElementById('scanBtn').addEventListener('click', function() {
                if (document.getElementById('scanner-container').classList.contains('active')) {
                    stopScanner();
                } else {
                    startScanner();
                }
            });

            // 关闭扫码
            document.getElementById('closeScanner').addEventListener('click', stopScanner);

            // 每30秒刷新
            setInterval(() => { cargarProductos(); }, 30000);

            // 聚焦输入
            setTimeout(() => { document.getElementById('searchInput').focus(); }, 500);
        });
    </script>
</body>
</html>
